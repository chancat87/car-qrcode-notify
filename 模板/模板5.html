<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>通知车主挪车</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 允许文本框选择文字 */
        .input-box-textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        /* CSS变量定义 */
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --background: #f0f4f8;
            --text: #333;
            --card: #fff;
            --shadow: rgba(0, 0, 0, 0.1);
            --slider-bg: #f3f4f6;
            --slider-text: #666;
            --toast-bg: rgba(255, 255, 255, 0.98);
            --toast-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            --animation-curve: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 主题样式 */
        body.dark {
            --primary: #60a5fa;
            --primary-dark: #3b82f6;
            --background: #1f2937;
            --text: #f3f4f6;
            --card: #374151;
            --shadow: rgba(0, 0, 0, 0.3);
            --slider-bg: #4b5563;
            --slider-text: #e5e7eb;
            --toast-bg: rgba(55, 65, 81, 0.98);
        }

        body.warm {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --background: #fff7ed;
            --text: #431407;
            --card: #fff;
            --shadow: rgba(249, 115, 22, 0.1);
            --slider-bg: #fed7aa;
            --slider-text: #9a3412;
            --toast-bg: rgba(255, 247, 237, 0.98);
        }

        /* 基础布局 */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            touch-action: manipulation;
            color: var(--text);
            transition: background-color 0.3s var(--animation-curve);
            overflow-x: hidden;
        }

        html {
            height: -webkit-fill-available;
        }

        /* 容器样式 */
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border-radius: 16px;
            padding: min(25px, 5vw);
            box-shadow: 0 4px 12px var(--shadow);
            transition: all 0.3s var(--animation-curve);
            margin: auto;
        }

        /* 标题样式 */
        h1 {
            font-size: clamp(24px, 5vw, 28px);
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titlePulse 2s var(--animation-curve) infinite;
            will-change: transform;
            position: relative;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            border-radius: 2px;
            animation: titleUnderline 2s var(--animation-curve) infinite;
        }

        /* 表单元素样式 */
        .select-box {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--slider-bg);
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            background: var(--card);
            color: var(--text);
            transition: all 0.3s var(--animation-curve);
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px;
        }

        .select-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        /* 下拉选项样式 */
        .select-box option {
            padding: 12px;
            font-size: 16px;
            background: var(--card);
            color: var(--text);
        }

        .select-box option[value="low"] {
            color: #3b82f6;
            background: linear-gradient(45deg, rgba(59, 130, 246, 0.1), transparent);
        }

        .select-box option[value="medium"] {
            color: #f59e0b;
            background: linear-gradient(45deg, rgba(245, 158, 11, 0.1), transparent);
        }

        .select-box option[value="high"] {
            color: #ef4444;
            background: linear-gradient(45deg, rgba(239, 68, 68, 0.1), transparent);
        }

        /* 文本框样式 */
        .input-box-textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--slider-bg);
            border-radius: 12px;
            font-size: 16px;
            min-height: 120px;
            margin-bottom: 20px;
            resize: none;
            background: var(--card);
            color: var(--text);
            transition: all 0.3s var(--animation-curve);
            -webkit-appearance: none;
            appearance: none;
        }

        .input-box-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }

        /* 按钮样式 */
        .notify-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s var(--animation-curve);
            -webkit-tap-highlight-color: transparent;
            will-change: transform;
        }

        .notify-btn:active {
            transform: scale(0.98);
        }

        /* 滑块样式 */
        .call-slider {
            width: 100%;
            height: 50px;
            background: var(--slider-bg);
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s var(--animation-curve);
            touch-action: none;
            margin-bottom: 15px;
        }

        .call-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--slider-text);
            font-size: 16px;
            z-index: 1;
            transition: opacity 0.3s var(--animation-curve);
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .call-handle {
            position: absolute;
            left: 2px;
            top: 2px;
            width: 46px;
            height: 46px;
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            border-radius: 23px;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.3s var(--animation-curve);
            will-change: transform;
        }

        .call-handle::after {
            content: '📞';
            animation: handlePulse 1.5s infinite;
            will-change: transform;
        }

        .call-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(90deg,
                    rgba(59, 130, 246, 0.1),
                    rgba(59, 130, 246, 0.2));
            transition: width 0.1s linear;
            will-change: width;
        }

        /* 主题切换按钮样式 */
        .theme-toggles {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 6px;
            z-index: 100;
        }

        .theme-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 16px;
            background: var(--card);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.3s var(--animation-curve);
            -webkit-tap-highlight-color: transparent;
        }

        .theme-btn:hover {
            transform: translateY(-2px);
        }

        .theme-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Toast提示样式 */
        .toast-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s var(--animation-curve);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .toast-container.show {
            opacity: 1;
            visibility: visible;
        }

        .toast-content {
            background: var(--toast-bg);
            border-radius: 20px;
            padding: clamp(20px, 5vw, 25px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: min(300px, 90vw);
            max-width: 90%;
            transform: scale(0.8) translateY(20px);
            opacity: 0;
            transition: all 0.3s var(--animation-curve);
            box-shadow: var(--toast-shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .toast-container.show .toast-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 成功状态的勾勾动画 */
        .toast-success {
            position: relative;
            width: 40px;
            height: 40px;
        }

        .toast-success::before,
        .toast-success::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 2px;
        }

        .toast-success::before {
            width: 3px;
            height: 20px;
            transform: rotate(45deg);
            right: 10px;
            top: 5px;
            animation: successLong 0.4s ease-in;
        }

        .toast-success::after {
            width: 30px;
            height: 3px;
            transform: rotate(45deg);
            left: 5px;
            top: 22px;
            animation: successShort 0.4s ease-out;
        }

        @keyframes successLong {
            0% {
                transform: rotate(45deg) scale(0);
            }

            100% {
                transform: rotate(45deg) scale(1);
            }
        }

        @keyframes successShort {
            0% {
                transform: rotate(45deg) scale(0);
            }

            100% {
                transform: rotate(45deg) scale(1);
            }
        }


        /* 错误状态的叉叉动画 */
        .toast-error {
            position: relative;
            width: 32px;
            height: 32px;
        }

        .toast-error::before,
        .toast-error::after {
            content: '';
            position: absolute;
            width: 32px;
            height: 3px;
            background: white;
            border-radius: 2px;
            top: 50%;
            left: 50%;
        }

        .toast-error::before {
            transform: translate(-50%, -50%) rotate(45deg);
            animation: errorLeft 0.4s ease-in;
        }

        .toast-error::after {
            transform: translate(-50%, -50%) rotate(-45deg);
            animation: errorRight 0.4s ease-in;
        }

        @keyframes errorLeft {
            0% {
                transform: translate(-50%, -50%) rotate(45deg) scaleX(0);
            }

            100% {
                transform: translate(-50%, -50%) rotate(45deg) scaleX(1);
            }
        }

        @keyframes errorRight {
            0% {
                transform: translate(-50%, -50%) rotate(-45deg) scaleX(0);
            }

            100% {
                transform: translate(-50%, -50%) rotate(-45deg) scaleX(1);
            }
        }

        /* 加载状态的动画 */
        .toast-loading {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        .toast-message {
            color: var(--text);
            font-size: 18px;
            text-align: center;
            font-weight: 500;
            margin-top: 10px;
            animation: messageSlide 0.3s var(--animation-curve);
        }

        @keyframes messageSlide {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }


        .toast-container.show {
            opacity: 1;
            visibility: visible;
        }

        .toast-content {
            background: var(--toast-bg);
            border-radius: 20px;
            padding: clamp(20px, 5vw, 25px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: min(300px, 90vw);
            max-width: 90%;
            transform: scale(0.8) translateY(20px);
            opacity: 0;
            transition: all 0.3s var(--animation-curve);
            box-shadow: var(--toast-shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .toast-container.show .toast-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* 历史记录样式 */
        .history-toggle {
            width: 100%;
            padding: 12px;
            background: var(--card);
            border: 2px solid var(--slider-bg);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s var(--animation-curve);
            margin-top: 15px;
            color: var(--text);
        }

        .history-toggle:hover {
            border-color: var(--primary);
        }

        .history-list {
            margin-top: 15px;
            display: none;
        }

        .history-list.show {
            display: block;
            animation: slideDown 0.3s var(--animation-curve);
        }

        .history-item {
            background: var(--card);
            border: 2px solid var(--slider-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            color: var(--text);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .history-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            color: white;
        }

        .history-badge.low {
            background: #3b82f6;
        }

        .history-badge.medium {
            background: #f59e0b;
        }

        .history-badge.high {
            background: #ef4444;
        }

        .history-time {
            font-size: 12px;
            color: var(--slider-text);
            margin-top: 8px;
        }

        /* 动画 */
        @keyframes titlePulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        @keyframes titleUnderline {

            0%,
            100% {
                width: 50px;
                opacity: 0.5;
            }

            50% {
                width: 100px;
                opacity: 1;
            }
        }

        @keyframes handlePulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .container {
                border-radius: 12px;
            }

            .notify-btn {
                padding: 12px;
                font-size: 16px;
            }

            .call-slider {
                height: 46px;
            }

            .call-handle {
                width: 42px;
                height: 42px;
            }

            .toast-content {
                padding: 20px;
            }

            .theme-btn {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }

            .theme-toggles {
                top: 8px;
                right: 8px;
                gap: 4px;
            }
        }
    </style>
</head>

<body>
    <!-- 主容器 -->
    <div class="container">
        <h1>通知❤{{no}}❤车主挪车</h1>

        <!-- 紧急程度选择 -->
        <select id="urgencySelect" class="select-box">
            <option value="">选择紧急程度...</option>
            <option value="low">⚪️ 普通</option>
            <option value="medium">🟡 紧急</option>
            <option value="high">🔴 非常紧急</option>
        </select>

        <!-- 消息模板选择 -->
        <select id="messageTemplate" class="select-box">
            <option value="">选择消息模板...</option>
            <option value="车辆挡住了出口，请尽快移动车辆。">🚗 车辆挡住了出口，请尽快移动车辆。</option>
            <option value="紧急情况，需要您立即移车！">⚡️ 紧急情况，需要您立即移车！</option>
            <option value="车辆占用了消防通道，请立即处理。">🚨 车辆占用了消防通道，请立即处理。</option>
            <option value="车辆影响施工，请及时挪车。">🚧 车辆影响施工，请及时挪车。</option>
        </select>

        <!-- 自定义消息输入框 -->
        <textarea id="messageInput" class="input-box-textarea"
            placeholder="可留下联系方式，方便车主联系您！可留空，默认发送信息给车主尽快前来移车！"></textarea>

        <!-- 通知按钮 -->
        <button id="notifyBtn" class="notify-btn">通知车主</button>

        <!-- 拨打电话滑块 -->
        <div id="callSlider" class="call-slider">
            <div class="call-text">向右滑动拨打电话</div>
            <div id="callHandle" class="call-handle"></div>
            <div id="callProgress" class="call-progress"></div>
        </div>

        <!-- 历史记录切换按钮 -->
        <button id="historyToggle" class="history-toggle">
            <span>通知历史记录</span>
            <span id="historyCount">0条记录</span>
        </button>

        <!-- 历史记录列表 -->
        <div id="historyList" class="history-list"></div>
    </div>

    <!-- 主题切换按钮组 -->
    <div class="theme-toggles">
        <button class="theme-btn active" data-theme="light">☀️</button>
        <button class="theme-btn" data-theme="warm">🌅</button>
        <button class="theme-btn" data-theme="dark">🌙</button>
    </div>

    <!-- Toast提示容器 -->
    <div id="toastContainer" class="toast-container">
        <div class="toast-content">
            <div class="toast-icon">
                <div class="toast-loading"></div>
            </div>
            <div class="toast-message"></div>
        </div>
    </div>

    <script>
        // 立即执行函数，避免全局变量污染
        (() => {
            // DOM元素引用
            const elements = {
                notifyBtn: document.getElementById('notifyBtn'),
                messageInput: document.getElementById('messageInput'),
                messageTemplate: document.getElementById('messageTemplate'),
                urgencySelect: document.getElementById('urgencySelect'),
                callSlider: document.getElementById('callSlider'),
                callHandle: document.getElementById('callHandle'),
                callProgress: document.getElementById('callProgress'),
                historyToggle: document.getElementById('historyToggle'),
                historyList: document.getElementById('historyList'),
                historyCount: document.getElementById('historyCount'),
                toastContainer: document.getElementById('toastContainer'),
                themeBtns: document.querySelectorAll('.theme-btn')
            };

            // 状态管理
            const state = {
                lastNotifyTime: 0,
                isDragging: false,
                startX: 0,
                currentX: 0,
                maxProgress: 0,
                notificationHistory: JSON.parse(localStorage.getItem('notificationHistory') || '[]')
            };

            // 触觉反馈功能
            const hapticFeedback = {
                light: () => navigator.vibrate?.(10),
                medium: () => navigator.vibrate?.(30),
                heavy: () => navigator.vibrate?.([50, 50, 50]),
                success: () => navigator.vibrate?.([50, 30, 50, 30, 50])
            };

            // 主题设置功能
            function setTheme(theme) {
                document.body.className = theme;
                elements.themeBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === theme);
                });
                localStorage.setItem('theme', theme);
                hapticFeedback.light();
            }

function getCarId() {
    // 获取当前路径，例如 "/car/1" 或 "/car/1?ref=home"
    const pathname = window.location.pathname;
    
    // 使用正则表达式匹配路径末尾的数字
    const match = pathname.match(/\/(\d+)$/);
    
    // 如果匹配成功，返回捕获组中的数字；否则返回 null
    return match ? match[1] : null;
}

            // Toast提示功能
            function showToast(message, type = 'loading') {
                const toastIcon = elements.toastContainer.querySelector('.toast-icon');
                const toastMessage = elements.toastContainer.querySelector('.toast-message');

                toastMessage.textContent = message;
                toastIcon.innerHTML = `<div class="toast-${type}"></div>`;
                elements.toastContainer.classList.add('show');

                if (type === 'error') hapticFeedback.heavy();
                if (type === 'success') hapticFeedback.medium();

                return new Promise(resolve => {
                    if (type !== 'loading') {
                        setTimeout(() => {
                            elements.toastContainer.classList.remove('show');
                            setTimeout(resolve, 300);
                        }, 2000);
                    } else {
                        resolve();
                    }
                });
            }

            // 更新历史记录显示
            function updateHistoryDisplay() {
                elements.historyCount.textContent = `${state.notificationHistory.length}条记录`;
                elements.historyList.innerHTML = state.notificationHistory.length === 0
                    ? '<div class="history-item">暂无通知记录</div>'
                    : state.notificationHistory.map(notification => `
                <div class="history-item">
                    <div class="history-header">
                        <span class="history-message">${notification.message}</span>
                        <span class="history-badge ${notification.urgency}">${notification.urgency === 'high' ? '非常紧急' :
                            notification.urgency === 'medium' ? '紧急' : '普通'
                        }</span>
                    </div>
                    <div class="history-time">
                        ${new Date(notification.timestamp).toLocaleString()}
                    </div>
                </div>
            `).join('');
            }

            // 通知车主功能
            async function notifyOwner() {
                let id = getCarId();
                if (!id) {
                    showToast("未获取到id参数");
                    return;
                }

                const now = Date.now();
                const message = elements.messageInput.value.trim() || "需要挪车，请及时处理。";
                const urgency = elements.urgencySelect.value || 'low';

                if (!urgency) {
                    await showToast('请选择紧急程度', 'error');
                    return;
                }

                hapticFeedback.medium();
                await showToast('正在通知车主...', 'loading');

                try {
                    const response = await fetch('/api/notify/message', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            id: id,
                            message: `[${urgency === 'high' ? '非常紧急' : urgency === 'medium' ? '紧急' : '普通'}] ${message}`,
                        })
                    });

                    if (!response.ok) throw new Error('Network response was not ok');

                    const data = await response.json();
                    if (data.code === 200) {
                        const notification = {
                            id: Date.now().toString(),
                            message,
                            urgency,
                            timestamp: now
                        };

                        state.notificationHistory = [notification, ...state.notificationHistory].slice(0, 10);
                        localStorage.setItem('notificationHistory', JSON.stringify(state.notificationHistory));
                        updateHistoryDisplay();

                        hapticFeedback.success();
                        await showToast('已成功通知车主，请稍候！', 'success');
                        state.lastNotifyTime = now;

                        elements.messageInput.value = '';
                        elements.messageTemplate.value = '';
                    } else {
                        throw new Error(data.msg || '未知错误');
                    }
                } catch (error) {
                    console.error('通知发送失败:', error);
                    hapticFeedback.heavy();
                    await showToast('发送失败，请检查网络后重试', 'error');
                }
            }

            // 拨打车主电话
            async function callOwner() {

                try {
                    let id = getCarId();

                    if (!id) {
                        showToast("未获取到id参数");
                        return;
                    }
                    await showToast('正在获取车主手机号...', 'loading');
                    const response = await fetch("/api/notify/call", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            id: id,
                        })
                    });

                    const data = await response.json();

                    if (data.code === 200) {
                        await showToast('获取车主手机号成功！', 'success');
                        window.location.href = "tel:" + data.data;
                    } else {
                        throw new Error(data.msg || '未知错误');
                    }
                } catch (error) {
                    console.error('获取车主手机号失败:', error);
                    hapticFeedback.heavy();
                    await showToast('获取车主手机号失败，请检查网络后重试', 'error');
                }


                // .then(response => response.json())
                // .then(data => {
                //     showLoading(false);
                //     if (data.code === 200) {
                //         window.location.href = "tel:" + data.data;
                //     } else {
                //         showToast(data.message);
                //     }
                // })
                // .catch(error => {
                //     showLoading(false);
                //     console.error("Error sending notification:", error);
                //     alert("通知发送出错，请检查网络连接。");
                // });
            }

            // 滑块更新功能
            function updateSlider(clientX) {
                const rect = elements.callSlider.getBoundingClientRect();
                const maxX = rect.width - elements.callHandle.offsetWidth;
                state.currentX = Math.max(0, Math.min(maxX, clientX - rect.left - elements.callHandle.offsetWidth / 2));

                const progress = (state.currentX / maxX) * 100;

                if (progress > state.maxProgress) {
                    state.maxProgress = progress;
                    if (progress > 25 && progress < 90) {
                        hapticFeedback.light();
                    }
                }

                elements.callHandle.style.transform = `translateX(${state.currentX}px)`;
                elements.callProgress.style.width = `${progress}%`;

                if (progress > 90) {
                    hapticFeedback.success();
                    setTimeout(resetSlider, 300);
                    callOwner();
                }
            }

            // 重置滑块状态
            function resetSlider() {
                elements.callHandle.style.transform = 'translateX(0)';
                elements.callProgress.style.width = '0';
                state.currentX = 0;
                state.isDragging = false;
                state.maxProgress = 0;
                hapticFeedback.medium();
            }

            // 结束拖动处理
            function endDrag() {
                if (!state.isDragging) return;
                state.isDragging = false;
                elements.callHandle.style.transition = 'transform 0.3s';
                elements.callProgress.style.transition = 'width 0.3s';
                resetSlider();
            }

            // 初始化
            function init() {
                // 设置初始主题
                setTheme(localStorage.getItem('theme') || 'light');

                // 更新历史记录显示
                updateHistoryDisplay();

                // 绑定事件监听器
                elements.themeBtns.forEach(btn => {
                    btn.addEventListener('click', () => setTheme(btn.dataset.theme));
                });

                elements.messageTemplate.addEventListener('change', (e) => {
                    if (e.target.value) {
                        elements.messageInput.value = e.target.value;
                    }
                });

                elements.historyToggle.addEventListener('click', () => {
                    elements.historyList.classList.toggle('show');
                    hapticFeedback.light();
                });

                elements.notifyBtn.addEventListener('click', notifyOwner);

                // 触摸事件
                elements.callSlider.addEventListener('touchstart', (e) => {
                    state.isDragging = true;
                    state.startX = e.touches[0].clientX;
                    elements.callHandle.style.transition = 'none';
                    elements.callProgress.style.transition = 'none';
                    hapticFeedback.light();
                }, { passive: true });

                elements.callSlider.addEventListener('touchmove', (e) => {
                    if (!state.isDragging) return;
                    e.preventDefault();
                    updateSlider(e.touches[0].clientX);
                }, { passive: false });

                // 鼠标事件
                elements.callSlider.addEventListener('mousedown', (e) => {
                    state.isDragging = true;
                    state.startX = e.clientX;
                    elements.callHandle.style.transition = 'none';
                    elements.callProgress.style.transition = 'none';
                });

                document.addEventListener('mousemove', (e) => {
                    if (!state.isDragging) return;
                    e.preventDefault();
                    updateSlider(e.clientX);
                }, { passive: false });

                // 结束拖动事件
                ['mouseup', 'mouseleave', 'touchend', 'touchcancel'].forEach(event => {
                    document.addEventListener(event, endDrag, { passive: true });
                });

                document.addEventListener('touchmove', (e) => {
                    if (state.isDragging) e.preventDefault();
                }, { passive: false });
            }

            // 启动应用
            init();
        })();

    </script>
