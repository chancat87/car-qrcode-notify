<!DOCTYPE html>
  <html lang="zh-CN">
  
  <head>
      <meta charset="UTF-8">
      <meta name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <title>通知车主挪车</title>
      <style>
          * {
              box-sizing: border-box;
              margin: 0;
              padding: 0;
          }
  
          body {
              font-family: Arial, sans-serif;
              display: flex;
              align-items: center;
              justify-content: center;
              height: 100vh;
              background: #f0f2f5;
              color: #333;
          }
  
          .container {
              text-align: center;
              padding: 20px;
              width: 100%;
              max-width: 400px;
              border-radius: 8px;
              box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
              background: #fff;
              margin: 10px
          }
  
          h1 {
              font-size: 24px;
              margin-bottom: 20px;
              color: #007bff;
          }
  
          p {
              margin-bottom: 20px;
              font-size: 16px;
              color: #555;
          }
  
          button {
              width: 100%;
              padding: 15px;
              margin: 10px 0;
              font-size: 18px;
              font-weight: bold;
              color: #fff;
              border: none;
              border-radius: 6px;
              cursor: pointer;
              transition: background 0.3s;
          }
  
          .notify-btn {
              background: #28a745;
          }
  
          .notify-btn:hover {
              background: #218838;
          }
  
          .call-btn {
              background: #17a2b8;
          }
  
          .call-btn:hover {
              background: #138496;
          }
  
          .loading {
              pointer-events: none;
              position: absolute;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
          }
  
          .loading::after {
              content: "";
              position: absolute;
              width: 20px;
              height: 20px;
              border: 3px solid #ffffff;
              border-radius: 50%;
              border-top-color: transparent;
              animation: spin 0.8s linear infinite;
          }
  
          @keyframes spin {
              0% { transform: translate(-50%, -50%) rotate(0deg); }
              100% { transform: translate(-50%, -50%) rotate(360deg); }
          }
  
          .toast {
              position: fixed;
              bottom: 20px;
              left: 50%;
              transform: translateX(-50%);
              background: rgba(0, 0, 0, 0.8);
              color: white;
              padding: 12px 24px;
              border-radius: 50px;
              font-size: 16px;
              opacity: 0;
              transition: opacity 0.3s;
          }
  
          .toast.show {
              opacity: 1;
          }
  
          .modal {
              display: none;
              position: fixed;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              background-color: rgba(0, 0, 0, 0.5);
          }

          .hide-btn{
              display:none
          }
      </style>
  </head>
  
  <body>
      <div class="container">
          <h1>通知车主挪车</h1>
          <p>如需通知车主，请点击以下按钮</p>
          <button class="notify-btn hide-btn" onclick="notifyOwner()">通知车主挪车</button>                    
          <button class="call-btn hide-btn" onclick="callOwner()">拨打车主电话</button>
      </div>
      <div id="toast" class="toast"></div>
      <div id="loadingBox" class="modal">
          <div class="loading"></div>
      </div>
  
      <script>
function getCarId() {
    // 获取当前路径，例如 "/car/1" 或 "/car/1?ref=home"
    const pathname = window.location.pathname;
    
    // 使用正则表达式匹配路径末尾的数字
    const match = pathname.match(/\/(\d+)$/);
    
    // 如果匹配成功，返回捕获组中的数字；否则返回 null
    return match ? match[1] : null;
}
  
          // 发送通知
          function notifyOwner() {
              let id = getCarId();
  
              if (!id) {
                  showToast("未获取到id参数");
                  return;
              }
  
              showLoading(true);
              fetch("/api/notify/message", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                      id: id,
                      message: ""
                  })
              })
                  .then(response => response.json())
                  .then(data => {
                          showLoading(false);
                      if (data.code === 200) {                          
                          showToast(data.data);
                      } else {
                          showToast(data.message);
                      }
                  })
                  .catch(error => {
                      showLoading(false);
                      console.error("Error sending notification:", error);
                      alert("通知发送出错，请检查网络连接。");
                  });
          }
  
          // 拨打车主电话
          function callOwner() {
              let id = getCarId();
  
              if (!id) {
                  showToast("未获取到id参数");
                  return;
              }
              showLoading(true);
              fetch("/api/notify/call", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                      id: id,
                  })
              })
                  .then(response => response.json())
                  .then(data => {
                      showLoading(false);
                      if (data.code === 200) {
                          window.location.href = "tel:" + data.data;
                      } else {
                          showToast(data.message);
                      }
                  })
                  .catch(error => {
                      showLoading(false);
                      console.error("Error sending notification:", error);
                      alert("通知发送出错，请检查网络连接。");
                  });
          }
  
          function showToast(message, duration = 5000) {
              const toast = document.getElementById('toast');
              toast.textContent = message;
              toast.classList.add('show');
              setTimeout(() => {
                  toast.classList.remove('show');
              }, duration);
          }
  
          // 显示添加模态框
          function showLoading(isShow) {
              if (isShow) {
                  document.getElementById('loadingBox').style.display = 'block';
              }
              else {
                  document.getElementById('loadingBox').style.display = 'none';
              }
          }

          const isMsgNotify = {{is_notify}};
          const isPhoneNotify = {{is_call}};

          if (isMsgNotify) {
              document.querySelector('.notify-btn').classList.remove('hide-btn');
          }

          if (isPhoneNotify) {
              document.querySelector('.call-btn').classList.remove('hide-btn');
          }
      </script>
</body>
  
  </html>
